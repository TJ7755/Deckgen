<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<title>deckgen</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #0b0f14;
    --bg2:          #0f141b;
    --border:       #1c232d;
    --fg:           #cbd5d1;
    --fg-strong:    #e6edea;
    --muted:        #6b7785;
    --dim:          #4b5563;
    --c-accent:     #5eead4;
    --c-cyan:       #5eead4;
    --c-teal:       #34d399;
    --c-green:      #4ade80;
    --c-lime:       #86efac;
    --c-yellow:     #fbbf24;
    --c-orange:     #fb923c;
    --c-red:        #f87171;
    --c-rose:       #fb7185;
    --c-pink:       #f472b6;
    --c-magenta:    #e879f9;
    --c-violet:     #a78bfa;
    --c-blue:       #60a5fa;
    --hl-row:       #1a2b25;
  }
  html[data-theme="light"] {
    --bg:           #f4efe6;
    --bg2:          #ece6da;
    --border:       #d6cdbb;
    --fg:           #2f2a22;
    --fg-strong:    #1a1714;
    --muted:        #6e6657;
    --dim:          #9a9181;
    --c-cyan:       #0e7c66;
    --c-teal:       #0d6f5b;
    --c-green:      #2f7a32;
    --c-lime:       #4a7a2a;
    --c-yellow:     #a36b1a;
    --c-orange:     #b85a18;
    --c-red:        #b3261e;
    --c-rose:       #b03a4e;
    --c-pink:       #a6447e;
    --c-magenta:    #8536a8;
    --c-violet:     #5b3fb0;
    --c-blue:       #1f5bb8;
    --hl-row:       #e3d9c4;
  }
  html[data-theme="alt"] {
    --bg:           #160d05;
    --bg2:          #1c1208;
    --border:       #3d2a16;
    --fg:           #e9b265;
    --fg-strong:    #f7d49a;
    --muted:        #8a6432;
    --dim:          #5a4220;
    --c-cyan:       #ffbf6b;
    --c-teal:       #f0c46f;
    --c-green:      #d4d166;
    --c-lime:       #c6cc59;
    --c-yellow:     #ffc864;
    --c-orange:     #ff9b3a;
    --c-red:        #ff6a44;
    --c-magenta:    #ffa3c8;
    --c-violet:     #d8a8ff;
    --c-blue:       #98c8ff;
    --hl-row:       #2a1c0c;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100vh; background: var(--bg); color: var(--fg); }
  body {
    font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    font-size: 14px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  .screen {
    min-height: 100vh;
    display: flex;
    align-items: stretch;
    justify-content: center;
    padding: 28px;
    background:
      radial-gradient(1200px 700px at 50% -10%, color-mix(in oklab, var(--c-accent) 6%, transparent) 0%, transparent 60%),
      var(--bg);
  }

  .panel {
    width: 100%;
    max-width: 1000px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 30px 80px -20px rgba(0,0,0,0.6);
    display: flex;
    flex-direction: column;
    height: calc(100vh - 56px);
    min-height: 600px;
    overflow: hidden;
  }

  /* Header */
  .hdr {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 22px 11px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .hdr-left { display: flex; align-items: baseline; gap: 12px; }
  .hdr-step { color: var(--muted); font-size: 13px; letter-spacing: 0.04em; }
  .hdr-label { color: var(--fg-strong); font-weight: 500; }
  .logo { display: inline-flex; align-items: center; gap: 9px; color: var(--c-accent); }
  .logo-text { font-weight: 700; letter-spacing: 0.22em; font-size: 13px; }

  /* Body / scroll area */
  .body {
    flex: 1;
    overflow-y: auto;
    padding: 18px 22px 12px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
    cursor: text;
  }
  .body::-webkit-scrollbar { width: 6px; }
  .body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Blocks */
  .blk { margin-bottom: 1px; }
  .row { display: flex; flex-wrap: wrap; gap: 6px; align-items: baseline; white-space: pre-wrap; word-break: break-word; }
  .spacer { height: 14px; }
  .spacer-sm { height: 6px; }

  .muted  { color: var(--muted); }
  .dim    { opacity: 0.65; }
  .c-cyan    { color: var(--c-cyan); }
  .c-teal    { color: var(--c-teal); }
  .c-green   { color: var(--c-green); }
  .c-yellow  { color: var(--c-yellow); }
  .c-orange  { color: var(--c-orange); }
  .c-red     { color: var(--c-red); }
  .c-magenta { color: var(--c-magenta); }
  .c-violet  { color: var(--c-violet); }
  .c-blue    { color: var(--c-blue); }
  .c-fg      { color: var(--fg-strong); }

  /* Prompt area */
  .prompt-area { display: flex; flex-direction: column; gap: 4px; }
  .prompt-label { color: var(--fg); }
  .opts { margin: 2px 0; }
  .opt-row { display: flex; gap: 8px; }
  .opt-num { color: var(--c-magenta); }
  .opt-name { color: var(--fg); }
  .opt-default { color: var(--fg-strong); font-weight: 700; }
  .input-line { display: flex; align-items: baseline; gap: 8px; }
  .arrow { color: var(--c-cyan); }
  .input-wrap { position: relative; display: inline-flex; align-items: baseline; }
  .real-input {
    background: transparent;
    border: none;
    outline: none;
    color: var(--c-cyan);
    font: inherit;
    width: min(600px, 55vw);
    caret-color: var(--c-accent);
    padding: 0;
  }
  .real-input.shell { color: var(--fg-strong); }
  .shell-line { display: flex; align-items: baseline; gap: 8px; }
  .shell-prompt { color: var(--c-cyan); }
  .user-value { color: var(--c-cyan); }

  .cursor {
    display: inline-block;
    width: 0.55em;
    height: 1em;
    background: var(--c-accent);
    vertical-align: text-bottom;
    animation: blink 1.1s steps(1) infinite;
    margin-left: 1px;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* Outline table */
  .table {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    margin: 4px 0;
  }
  .trow {
    display: grid;
    grid-template-columns: 40px 200px 1fr 70px;
    padding: 5px 12px;
    gap: 14px;
    border-bottom: 1px solid color-mix(in oklab, var(--border) 60%, transparent);
    align-items: baseline;
  }
  .trow:last-child { border-bottom: none; }
  .trow.thead { background: color-mix(in oklab, var(--fg-strong) 4%, transparent); color: var(--muted); font-size: 12px; letter-spacing: 0.06em; }
  .trow .c-num { color: var(--muted); }
  .trow .c-words { color: var(--muted); text-align: right; }
  .trow .c-title { color: var(--fg-strong); }
  .trow.hi { background: var(--hl-row); }
  .trow.hi .c-title, .trow.hi .c-words, .trow.hi .c-num { color: var(--c-green); }

  /* Build list */
  .buildlist { margin: 2px 0; }

  /* Server panel */
  .srvpanel {
    width: 100%;
    margin: 6px 0 4px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    overflow: hidden;
  }
  .srvpanel-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 7px 12px;
    border-bottom: 1px solid var(--border);
    background: color-mix(in oklab, var(--fg-strong) 3%, transparent);
    font-size: 12px;
  }
  .srv-dots { display: flex; gap: 5px; }
  .srv-dot { width: 9px; height: 9px; border-radius: 50%; }
  .srv-dot.d1 { background: var(--c-red); }
  .srv-dot.d2 { background: var(--c-yellow); }
  .srv-dot.d3 { background: var(--c-green); }
  .srv-url { color: var(--c-cyan); flex: 1; }
  .srv-live { color: var(--c-green); font-size: 11px; letter-spacing: 0.08em; display: flex; align-items: center; gap: 5px; }
  .srv-dot-pulse { width: 7px; height: 7px; border-radius: 50%; background: var(--c-green); animation: pulse 1.6s ease-out infinite; }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 color-mix(in oklab, var(--c-green) 70%, transparent); }
    70%  { box-shadow: 0 0 0 8px color-mix(in oklab, var(--c-green) 0%, transparent); }
    100% { box-shadow: 0 0 0 0 color-mix(in oklab, var(--c-green) 0%, transparent); }
  }
  .srvpanel-stage {
    padding: 14px;
    background: color-mix(in oklab, var(--bg) 60%, #000 40%);
    min-height: 160px;
    display: flex;
    align-items: stretch;
  }
  html[data-theme="light"] .srvpanel-stage { background: color-mix(in oklab, var(--bg) 70%, #fff 30%); }
  .srv-slide {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg2);
    padding: 16px 20px 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    box-shadow: 0 8px 24px -12px rgba(0,0,0,0.5);
  }
  .srv-slide-title { color: var(--fg-strong); font-size: 20px; font-weight: 500; flex: 1; line-height: 1.3; }
  .srv-slide-foot { display: flex; align-items: center; justify-content: space-between; border-top: 1px dashed var(--border); padding-top: 8px; font-size: 12px; }
  .srv-controls { display: flex; gap: 4px; }
  .srv-controls button {
    appearance: none;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--c-cyan);
    width: 26px; height: 22px;
    border-radius: 4px;
    cursor: pointer;
    font: inherit;
    font-size: 14px;
    padding: 0;
  }
  .srv-controls button:hover:not(:disabled) { background: color-mix(in oklab, var(--c-accent) 10%, transparent); }
  .srv-controls button:disabled { opacity: 0.3; cursor: default; }
  .srvpanel-foot { padding: 6px 12px; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); }
  .open-link { color: var(--c-cyan); text-decoration: underline; cursor: pointer; background: none; border: none; font: inherit; padding: 0; }
  .open-link:hover { opacity: 0.8; }

  /* Tip bar */
  .tip {
    border-top: 1px solid var(--border);
    padding: 9px 22px;
    color: var(--muted);
    font-size: 12.5px;
    flex-shrink: 0;
  }
  .tip-pipe { color: var(--c-yellow); margin-right: 4px; }
</style>
</head>
<body>
<div id="root"></div>

<script>
  // Replace with your Gemini API key
  const GEMINI_API_KEY = 'YOUR_GEMINI_API_KEY_HERE';
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useLayoutEffect } = React;

// ── Constants ────────────────────────────────────────────────────────────────

const SYSTEM_PROMPT = `You are Deckgen, a command-line tool for generating polished presentation decks.
Always write in British English. Do not use emojis or pointless icons in any output.
When asked to return JSON, return strict JSON only — no markdown fences, no commentary, no explanation.`;

const TYPE_PALETTE = {
  'Title Card':      'var(--c-cyan)',
  'Section Divider': 'var(--c-orange)',
  'Two Column':      'var(--c-yellow)',
  'Chart - Bar':     'var(--c-blue)',
  'Chart - Line':    'var(--c-blue)',
  'Body Text':       'var(--c-teal)',
  'Quote Callout':   'var(--c-magenta)',
  'Data Table':      'var(--c-lime)',
  'List':            'var(--c-violet)',
  'Image Hero':      'var(--c-pink)',
  'Comparison':      'var(--c-rose)',
};

const FALLBACK_OUTLINE = [
  { type: 'Title Card',      title: 'Presentation Overview',        words: 2 },
  { type: 'Section Divider', title: 'Background',                   words: 1 },
  { type: 'Body Text',       title: 'Key Points',                   words: 2 },
  { type: 'Chart - Bar',     title: 'Data Summary',                 words: 2 },
  { type: 'List',            title: 'Recommendations',              words: 1 },
  { type: 'Body Text',       title: 'Next Steps',                   words: 2 },
];

const sleep = ms => new Promise(r => setTimeout(r, ms));
const slugify = s => s.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '').slice(0, 40) || 'untitled';

// ── Gemini API ───────────────────────────────────────────────────────────────

async function callGemini(prompt) {
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite:generateContent?key=${GEMINI_API_KEY}`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] },
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { responseMimeType: "application/json" }
      }),
    }
  );
  const data = await res.json();
  const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
  if (!text) throw new Error('Gemini returned no content: ' + JSON.stringify(data));
  return text;
}

function parseJSON(text) {
  const cleaned = text.replace(/```json|```/g, '').trim();
  const m = cleaned.match(/\{[\s\S]*\}/);
  return JSON.parse(m ? m[0] : cleaned);
}

async function generateOutline(brief, count) {
  const types = Object.keys(TYPE_PALETTE).join(', ');
  const txt = await callGemini(
    `Plan a ${count}-slide presentation deck for this brief: "${brief}"\n\n` +
    `Choose a varied mix from: ${types}.\n` +
    `Slide 1 must be a Title Card. Include at least one Section Divider and one chart or data table.\n` +
    `Return STRICT JSON only: {"slides":[{"type":"Title Card","title":"..."},...]}\n` +
    `Titles must be 3–7 words. Return exactly ${count} slides.`
  );
  const parsed = parseJSON(txt);
  return parsed.slides.slice(0, count).map(s => ({
    type: TYPE_PALETTE[s.type] ? s.type : 'Body Text',
    title: s.title,
    words: s.title.split(/\s+/).filter(Boolean).length,
  }));
}

async function reviseOutline(outline, instruction) {
  const types = Object.keys(TYPE_PALETTE).join(', ');
  const txt = await callGemini(
    `Revise this deck outline based on the instruction below.\n` +
    `Current outline: ${JSON.stringify(outline)}\n` +
    `Allowed types: ${types}.\n` +
    `Instruction: "${instruction}"\n` +
    `Return STRICT JSON only: {"slides":[{"type":"...","title":"..."},...]}\n` +
    `Keep the same slide count unless instructed otherwise.`
  );
  const parsed = parseJSON(txt);
  return parsed.slides.map(s => ({
    type: TYPE_PALETTE[s.type] ? s.type : 'Body Text',
    title: s.title,
    words: s.title.split(/\s+/).filter(Boolean).length,
  }));
}

async function generateSlideContent(outline, brief) {
  const txt = await callGemini(
    `Expand this presentation outline into full slide content.\n` +
    `Brief: "${brief}"\n` +
    `Outline: ${JSON.stringify(outline.map(s => ({ type: s.type, title: s.title })))}\n\n` +
    `Return STRICT JSON only:\n` +
    `{"slides":[{"type":"...","title":"...","content":["..."]}]}\n\n` +
    `Rules for the content array:\n` +
    `- Title Card: one subtitle or tagline\n` +
    `- Section Divider: empty array []\n` +
    `- All other types: 3–5 concise bullet points\n` +
    `Write in British English. Be specific and professional.`
  );
  const parsed = parseJSON(txt);
  return parsed.slides;
}

// ── Reveal.js HTML generator ─────────────────────────────────────────────────

function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buildRevealHTML(slides, variant, brief) {
  const themeMap = { dark: 'black', light: 'white', alt: 'moon' };
  const theme = themeMap[variant] || 'black';

  const sections = slides.map(s => {
    const content = Array.isArray(s.content) ? s.content : [];
    if (s.type === 'Title Card') {
      return (
        `  <section>\n` +
        `    <h1>${escHtml(s.title)}</h1>\n` +
        (content[0] ? `    <p>${escHtml(content[0])}</p>\n` : '') +
        `  </section>`
      );
    }
    if (s.type === 'Section Divider') {
      return `  <section>\n    <h2 style="text-align:center">${escHtml(s.title)}</h2>\n  </section>`;
    }
    const bullets = content.length
      ? `    <ul>\n${content.map(b => `      <li>${escHtml(b)}</li>`).join('\n')}\n    </ul>\n`
      : '';
    return `  <section>\n    <h2>${escHtml(s.title)}</h2>\n${bullets}  </section>`;
  }).join('\n\n');

  return `<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>${escHtml(brief)}</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.6.1/reveal.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.6.1/theme/${theme}.min.css" id="theme">
<style>
  .reveal h1 { font-size: 2.2em; }
  .reveal h2 { font-size: 1.5em; }
  .reveal ul { text-align: left; margin-left: 1em; }
  .reveal li { margin-bottom: 0.35em; }
  .reveal p  { font-size: 1em; opacity: 0.8; }
</style>
</head>
<body>
<div class="reveal">
  <div class="slides">

${sections}

  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.6.1/reveal.min.js"><\/script>
<script>
Reveal.initialize({
  hash: true,
  slideNumber: 'c/t',
  transition: 'slide',
  controls: true,
  progress: true,
});
<\/script>
</body>
</html>`;
}

// ── Small components ─────────────────────────────────────────────────────────

const TypeTag = ({ name }) => {
  const colour = TYPE_PALETTE[name] || 'var(--muted)';
  return <span style={{ color: colour }}>[{name}]</span>;
};

const Logo = () => (
  <span className="logo">
    <svg width="20" height="18" viewBox="0 0 24 22" fill="none" aria-hidden="true">
      <rect x="2"  y="3"  width="14" height="16" rx="1.2" stroke="currentColor" strokeWidth="1.6"/>
      <rect x="6"  y="7"  width="14" height="13" rx="1.2" stroke="currentColor" strokeWidth="1.6" fill="var(--bg)"/>
      <line x1="9" y1="11" x2="17" y2="11" stroke="currentColor" strokeWidth="1.4"/>
      <line x1="9" y1="14" x2="14" y2="14" stroke="currentColor" strokeWidth="1.4"/>
      <line x1="9" y1="17" x2="16" y2="17" stroke="currentColor" strokeWidth="1.4"/>
    </svg>
    <span className="logo-text">DECKGEN</span>
  </span>
);

const Spinner = ({ label, color, done, elapsed }) => {
  const frames = ['◐','◓','◑','◒'];
  const [i, setI] = useState(0);
  useEffect(() => {
    if (done) return;
    const id = setInterval(() => setI(x => (x + 1) % 4), 110);
    return () => clearInterval(id);
  }, [done]);
  return (
    <div className="row">
      <span style={{ color }}>{done ? '✓' : frames[i]} {label}</span>
      <span className="muted" style={{ marginLeft: 'auto' }}>({elapsed.toFixed(1)}s)</span>
    </div>
  );
};

const OutlineTable = ({ rows, highlight }) => (
  <div className="table">
    <div className="trow thead">
      <span>#</span><span>TYPE</span><span>TITLE</span><span style={{textAlign:'right'}}>WORDS</span>
    </div>
    {rows.map((r, idx) => (
      <div className={'trow' + (highlight === idx ? ' hi' : '')} key={idx}>
        <span className="c-num">{idx + 1}.</span>
        <span><TypeTag name={r.type}/></span>
        <span className="c-title">"{r.title}"</span>
        <span className="c-words" style={{textAlign:'right'}}>{r.words}</span>
      </div>
    ))}
  </div>
);

const ServerPanel = ({ outline, blobUrl, filename }) => {
  const [slide, setSlide] = useState(0);
  const total = outline.length;
  const cur = outline[slide] || {};
  return (
    <div className="srvpanel">
      <div className="srvpanel-bar">
        <span className="srv-dots">
          <span className="srv-dot d1"/><span className="srv-dot d2"/><span className="srv-dot d3"/>
        </span>
        <span className="srv-url">{filename}</span>
        <span className="srv-live"><span className="srv-dot-pulse"/> READY</span>
      </div>
      <div className="srvpanel-stage">
        <div className="srv-slide">
          <div style={{fontSize:12}}><TypeTag name={cur.type}/></div>
          <div className="srv-slide-title">{cur.title}</div>
          <div className="srv-slide-foot">
            <span className="muted">Slide {slide + 1} / {total}</span>
            <span className="srv-controls">
              <button onClick={() => setSlide(s => Math.max(0, s-1))} disabled={slide === 0}>‹</button>
              <button onClick={() => setSlide(s => Math.min(total-1, s+1))} disabled={slide === total-1}>›</button>
            </span>
          </div>
        </div>
      </div>
      <div className="srvpanel-foot">
        <button className="open-link" onClick={() => window.open(blobUrl, '_blank')}>
          Open presentation in new tab
        </button>
        {' · '}
        <a className="open-link" href={blobUrl} download={filename}>Download HTML</a>
      </div>
    </div>
  );
};

// ── Main App ─────────────────────────────────────────────────────────────────

function App() {
  const [blocks, setBlocks]   = useState([]);
  const [input, setInput]     = useState('');
  const [prompt, setPrompt]   = useState(null);
  const [stage, setStage]     = useState({ step: 1, total: 6, label: 'Launch' });

  const idRef     = useRef(0);
  const inputRef  = useRef(null);
  const scrollRef = useRef(null);
  const state     = useRef({ brief: '', slides: 6, variant: 'dark', outline: null });

  const nextId = () => ++idRef.current;

  const push = useCallback(block => {
    setBlocks(b => [...b, { id: nextId(), ...block }]);
  }, []);

  const updateBlock = useCallback((id, patch) => {
    setBlocks(b => b.map(bl => bl.id === id ? { ...bl, ...patch } : bl));
  }, []);

  // Auto-scroll
  useLayoutEffect(() => {
    const el = scrollRef.current;
    if (el) el.scrollTop = el.scrollHeight;
  }, [blocks, prompt]);

  // Focus input
  useEffect(() => {
    if (prompt && inputRef.current) inputRef.current.focus();
  }, [prompt]);

  // Theme sync
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', state.current.variant || 'dark');
  });

  // ── Flow ──────────────────────────────────────────────────────────────────

  const startFlow = useCallback(() => {
    setBlocks([]);
    state.current = { brief: '', slides: 6, variant: 'dark', outline: null };
    setStage({ step: 1, total: 6, label: 'Launch' });
    setTimeout(() => {
      push({ kind: 'text', text: 'No arguments detected. Running interactive mode.', cls: 'muted' });
      push({ kind: 'spacer' });
      setPrompt({ kind: 'brief', label: "Brief — what is this deck about?" });
    }, 0);
  }, [push]);

  useEffect(() => { startFlow(); }, []);

  const submit = async raw => {
    const value = raw.trim();
    if (!prompt) return;
    push({ kind: 'echo', label: prompt.label, value, options: prompt.options, defaultIdx: prompt.defaultIdx });
    setInput('');

    switch (prompt.kind) {
      case 'brief': {
        if (!value) { setPrompt({ ...prompt }); return; }
        state.current.brief = value;
        setStage({ step: 2, total: 6, label: 'Slide count' });
        push({ kind: 'spacer' });
        setPrompt({ kind: 'slides', label: 'Number of slides [default: 6]:' });
        return;
      }
      case 'slides': {
        const n = value === '' ? 6 : Math.max(2, Math.min(40, parseInt(value, 10) || 6));
        state.current.slides = n;
        setStage({ step: 3, total: 6, label: 'Colour variant' });
        push({ kind: 'spacer' });
        setPrompt({
          kind: 'variant',
          label: 'Colour variant:',
          options: ['Dark', 'Light', 'Alt (amber)'],
          defaultIdx: 0,
        });
        return;
      }
      case 'variant': {
        const idx = value === '' ? 0 : Math.max(0, Math.min(2, parseInt(value, 10) - 1));
        state.current.variant = ['dark', 'light', 'alt'][idx];
        document.documentElement.setAttribute('data-theme', state.current.variant);
        await runGenerate();
        return;
      }
      case 'proceed': {
        const v = value.toLowerCase();
        if (v === '' || v === 'y' || v === 'yes') { await runBuild(); return; }
        if (v === 'n' || v === 'no') { runAbort(); return; }
        await runEdit(value);
        return;
      }
      case 'shell': {
        await runShellCmd(value);
        return;
      }
    }
  };

  const runGenerate = async () => {
    setStage({ step: 4, total: 6, label: 'Generating outline' });
    setPrompt(null);
    push({ kind: 'spacer' });
    const spinId = nextId();
    const startedAt = Date.now();
    setBlocks(b => [...b, { id: spinId, kind: 'spinner', label: 'Generating outline via Gemini...', color: 'var(--c-cyan)', startedAt, done: false, elapsed: 0 }]);

    let outline;
    try {
      [outline] = await Promise.all([
        generateOutline(state.current.brief, state.current.slides),
        sleep(1200),
      ]);
    } catch (e) {
      outline = FALLBACK_OUTLINE.slice(0, state.current.slides);
      push({ kind: 'text', text: 'Warning: Gemini call failed — using fallback outline.', cls: 'c-yellow' });
    }

    updateBlock(spinId, { done: true, elapsed: (Date.now() - startedAt) / 1000 });
    state.current.outline = outline;
    push({ kind: 'outline', rows: outline });
    push({ kind: 'spacer' });
    setStage({ step: 5, total: 6, label: 'Review outline' });
    setPrompt({ kind: 'proceed', label: 'Proceed? [Y/n] or type an edit instruction:' });
  };

  const runEdit = async instruction => {
    setStage({ step: 5, total: 6, label: 'Revising outline' });
    setPrompt(null);
    push({ kind: 'spacer' });
    const spinId = nextId();
    const startedAt = Date.now();
    setBlocks(b => [...b, { id: spinId, kind: 'spinner', label: 'Revising outline...', color: 'var(--c-magenta)', startedAt, done: false, elapsed: 0 }]);

    let newOutline;
    try {
      [newOutline] = await Promise.all([
        reviseOutline(state.current.outline, instruction),
        sleep(1000),
      ]);
    } catch (e) {
      newOutline = state.current.outline;
    }

    updateBlock(spinId, { done: true, elapsed: (Date.now() - startedAt) / 1000 });
    const prevTitles = state.current.outline.map(s => s.title);
    const hi = newOutline.findIndex((s, i) => s.title !== prevTitles[i] || s.type !== (state.current.outline[i] || {}).type);
    state.current.outline = newOutline;
    push({ kind: 'outline', rows: newOutline, highlight: hi >= 0 ? hi : undefined });
    push({ kind: 'spacer' });
    setPrompt({ kind: 'proceed', label: 'Proceed? [Y/n] or type an edit instruction:' });
  };

  const runAbort = () => {
    setStage({ step: null, total: null, label: 'Aborted' });
    setPrompt(null);
    push({ kind: 'spacer' });
    push({ kind: 'text', text: 'Aborted. No files created.', cls: 'muted' });
    push({ kind: 'spacer' });
    setPrompt({ kind: 'shell' });
  };

  const runBuild = async () => {
    setStage({ step: 6, total: 6, label: 'Building' });
    setPrompt(null);
    push({ kind: 'spacer' });

    const brief    = state.current.brief;
    const variant  = state.current.variant;
    const outline  = state.current.outline;
    const slug     = slugify(brief);
    const stamp    = new Date().toISOString().slice(0, 10).replace(/-/g, '');
    const dir      = `./output/${slug}_${stamp}`;
    const filename = `${slug}_${stamp}.html`;

    push({ kind: 'text', text: 'Building reveal.js deck...', cls: 'c-blue' });

    // Simulated folder + install steps
    await sleep(220);
    push({ kind: 'text', text: `Creating directory ${dir}/`, cls: 'muted' });
    await sleep(180);
    push({ kind: 'text', text: 'Installing reveal.js via CDN — no npm required.', cls: 'muted dim' });
    await sleep(260);

    // Build list — slide-by-slide ticks
    const buildId = nextId();
    setBlocks(b => [...b, { id: buildId, kind: 'buildList', rows: outline.map(() => ({ status: 'pending' })) }]);

    // Generate slide content with Gemini, tick slides as we go
    let richSlides;
    try {
      const contentPromise = generateSlideContent(outline, brief);
      // Tick slides at ~300ms intervals while waiting for content
      for (let i = 0; i < outline.length; i++) {
        await sleep(300 + Math.random() * 120);
        setBlocks(b => b.map(bl => {
          if (bl.id !== buildId) return bl;
          const rows = [...bl.rows];
          rows[i] = { status: 'ok' };
          return { ...bl, rows };
        }));
      }
      richSlides = await contentPromise;
    } catch (e) {
      richSlides = outline.map(s => ({ ...s, content: [] }));
      push({ kind: 'text', text: 'Warning: slide content generation failed — using titles only.', cls: 'c-yellow' });
    }

    // Generate HTML
    await sleep(200);
    const html    = buildRevealHTML(richSlides, variant, brief);
    const blob    = new Blob([html], { type: 'text/html' });
    const blobUrl = URL.createObjectURL(blob);

    // Server boot sim
    const bootId = nextId();
    const bootStart = Date.now();
    setBlocks(b => [...b, { id: bootId, kind: 'spinner', label: `Writing ${dir}/index.html`, color: 'var(--c-violet)', startedAt: bootStart, done: false, elapsed: 0 }]);
    await sleep(600 + Math.random() * 300);
    updateBlock(bootId, { done: true, elapsed: (Date.now() - bootStart) / 1000 });

    push({ kind: 'text', text: `Wrote ${outline.length} slides + assets.`, cls: 'c-green' });
    await sleep(180);
    push({ kind: 'serverPanel', outline, blobUrl, filename });
    push({ kind: 'spacer' });
    setStage({ step: null, total: null, label: 'Done' });
    setPrompt({ kind: 'shell' });
  };

  const runShellCmd = async cmd => {
    const c = cmd.trim();
    if (!c) { setPrompt({ kind: 'shell' }); return; }
    if (c === 'clear') { setBlocks([]); setPrompt({ kind: 'shell' }); return; }
    if (c === 'deckgen' || c === 'restart') { startFlow(); return; }
    push({ kind: 'text', text: `command not found: ${c}`, cls: 'c-red' });
    push({ kind: 'spacer' });
    setPrompt({ kind: 'shell' });
  };

  const onKey = e => {
    if (e.key === 'Enter') { e.preventDefault(); submit(input); }
  };

  // ── Block renderer ────────────────────────────────────────────────────────

  const renderBlock = b => {
    switch (b.kind) {
      case 'text':
        return <div className={'row ' + (b.cls || '')}>{b.text}</div>;
      case 'spacer':
        return <div className="spacer"/>;
      case 'echo': {
        const isDefault = !b.value;
        return (
          <div className="row">
            {b.label && <span className="muted">{b.label}</span>}
            {b.label && ' '}
            <span className="arrow">→</span>{' '}
            {isDefault
              ? <span className="muted">(default)</span>
              : <span className="user-value">{b.value}</span>
            }
          </div>
        );
      }
      case 'spinner': {
        const elapsed = b.done ? b.elapsed : (Date.now() - b.startedAt) / 1000;
        return <Spinner label={b.label} color={b.color} done={b.done} elapsed={elapsed}/>;
      }
      case 'outline':
        return <OutlineTable rows={b.rows} highlight={b.highlight}/>;
      case 'buildList':
        return (
          <div className="buildlist">
            {b.rows.map((r, i) => {
              const row = (state.current.outline || FALLBACK_OUTLINE)[i];
              if (!row) return null;
              const sym = r.status === 'ok' ? '✓' : '·';
              const cls = r.status === 'ok' ? 'c-green' : 'muted';
              return (
                <div className="row" key={i}>
                  <span className={cls}>{sym}</span>{' '}
                  <span className={r.status === 'pending' ? 'muted' : ''}>
                    Slide {i + 1} — {row.type}
                  </span>
                </div>
              );
            })}
          </div>
        );
      case 'serverPanel':
        return <ServerPanel outline={b.outline} blobUrl={b.blobUrl} filename={b.filename}/>;
      default:
        return null;
    }
  };

  // ── Render ────────────────────────────────────────────────────────────────

  const isShell = prompt?.kind === 'shell';

  return (
    <div className="screen">
      <div className="panel">
        {/* Header */}
        <div className="hdr">
          <div className="hdr-left">
            {stage.step != null && <span className="hdr-step">{stage.step}/{stage.total}</span>}
            <span className="hdr-label">{stage.label}</span>
          </div>
          <Logo/>
        </div>

        {/* Scrollable body */}
        <div className="body" ref={scrollRef} onClick={() => inputRef.current?.focus()}>
          {blocks.map(b => <div key={b.id} className="blk">{renderBlock(b)}</div>)}

          {/* Active prompt */}
          {prompt && (
            <div className="blk">
              {isShell ? (
                <div className="shell-line">
                  <span className="shell-prompt">~ deckgen ›</span>
                  <input
                    ref={inputRef}
                    className="real-input shell"
                    value={input}
                    onChange={e => setInput(e.target.value)}
                    onKeyDown={onKey}
                    spellCheck="false"
                    autoCapitalize="off"
                    autoComplete="off"
                  />
                  {input === '' && <span className="cursor"/>}
                </div>
              ) : (
                <div className="prompt-area">
                  <div className="prompt-label">{prompt.label}</div>
                  {prompt.options && (
                    <div className="opts">
                      {prompt.options.map((o, i) => (
                        <div key={o} className="opt-row">
                          <span className="opt-num">{i + 1}.</span>{' '}
                          <span className={i === (prompt.defaultIdx ?? -1) ? 'opt-default' : 'opt-name'}>{o}</span>
                        </div>
                      ))}
                    </div>
                  )}
                  <div className="input-line">
                    <span className="arrow">→</span>
                    <input
                      ref={inputRef}
                      className="real-input"
                      value={input}
                      onChange={e => setInput(e.target.value)}
                      onKeyDown={onKey}
                      spellCheck="false"
                      autoCapitalize="off"
                      autoComplete="off"
                    />
                    {input === '' && <span className="cursor"/>}
                  </div>
                </div>
              )}
            </div>
          )}
        </div>

        {/* Tip */}
        <div className="tip">
          <span className="tip-pipe">|</span>
          Type <span className="c-cyan">deckgen</span> at the shell prompt to start over.
          Press <span className="c-cyan">Enter</span> with no input to accept defaults.
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
